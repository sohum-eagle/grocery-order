<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f5f5f5; display: flex; align-items: center;
         justify-content: center; min-height: 100vh; }
  .card { background: #fff; border-radius: 12px; padding: 36px 32px;
          box-shadow: 0 1px 8px rgba(0,0,0,.1); width: 100%; max-width: 360px; }
  h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 24px; }
  input { width: 100%; padding: 11px 14px; border: 1px solid #ddd;
          border-radius: 8px; font-size: 1rem; margin-bottom: 12px; }
  input:focus { outline: none; border-color: #06c167; }
  button { width: 100%; background: #000; color: #fff; border: none;
           border-radius: 8px; padding: 12px; font-size: 1rem;
           font-weight: 600; cursor: pointer; }
  button:hover { background: #333; }
  .error { color: #d00; font-size: .88rem; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <h1>Admin Login</h1>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
