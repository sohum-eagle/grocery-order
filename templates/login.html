<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Login — Grocery Order</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #fafafa; display: flex; align-items: center;
         justify-content: center; min-height: 100vh; }
  .card { background: #fff; border: 1px solid #e4e4e7; border-radius: 8px;
          padding: 36px 32px; width: 100%; max-width: 380px; }
  .logo { font-size: .75rem; font-weight: 600; text-transform: uppercase;
          letter-spacing: .8px; color: #71717a; margin-bottom: 20px; }
  h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -.3px; margin-bottom: 6px; }
  .subtitle { font-size: .875rem; color: #71717a; margin-bottom: 24px; }
  label { display: block; font-size: .8rem; font-weight: 500; color: #52525b; margin-bottom: 5px; }
  input { width: 100%; padding: 9px 12px; border: 1px solid #d4d4d8; border-radius: 6px;
          font-size: .9rem; font-family: inherit; margin-bottom: 14px; }
  input:focus { outline: none; border-color: #111; box-shadow: 0 0 0 3px rgba(0,0,0,.06); }
  button { width: 100%; background: #111; color: #fff; border: none; border-radius: 6px;
           padding: 10px; font-size: .9rem; font-weight: 600; cursor: pointer; }
  button:hover { background: #27272a; }
  .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
           border-radius: 6px; padding: 9px 12px; font-size: .85rem; margin-bottom: 14px; }
  .back { display: block; text-align: center; margin-top: 16px; font-size: .82rem;
          color: #71717a; text-decoration: none; }
  .back:hover { color: #111; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Grocery Order</div>
  <h1>Admin sign in</h1>
  <p class="subtitle">Review and place orders for the team.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Password</label>
    <input type="password" name="password" autofocus required placeholder="Enter admin password">
    <button type="submit">Sign in →</button>
  </form>
  <a class="back" href="/">← Back to submission page</a>
</div>
</body>
</html>
